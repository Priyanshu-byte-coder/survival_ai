<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival AI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #2d2d2d;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #404040;
        }
        h1 { font-size: 1.2rem; color: #ff6b35; }
        .status { font-size: 0.8rem; color: #888; }
        .status .ok { color: #4caf50; }
        .status .error { color: #f44336; }

        .main {
            flex: 1;
            display: flex;
            padding: 20px;
            gap: 20px;
        }

        .chat-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 800px;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #252525;
            border-radius: 8px;
            margin-bottom: 15px;
            min-height: 400px;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px 15px;
            border-radius: 8px;
            max-width: 80%;
        }

        .message.user {
            background: #3d5a80;
            margin-left: auto;
        }

        .message.ai {
            background: #2d2d2d;
        }

        .message .sources {
            font-size: 0.75rem;
            color: #888;
            margin-top: 8px;
            border-top: 1px solid #404040;
            padding-top: 8px;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        #user-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #404040;
            border-radius: 8px;
            background: #2d2d2d;
            color: #e0e0e0;
            font-size: 1rem;
        }

        #user-input:focus { outline: none; border-color: #ff6b35; }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }

        #send-btn { background: #ff6b35; color: white; }
        #send-btn:hover { background: #e55a2b; }

        #mic-btn { background: #404040; color: #e0e0e0; }
        #mic-btn:hover { background: #505050; }
        #mic-btn.listening { background: #f44336; }

        .sidebar {
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel {
            background: #2d2d2d;
            border-radius: 8px;
            padding: 15px;
        }

        .panel h2 {
            font-size: 1rem;
            margin-bottom: 12px;
            color: #ff6b35;
        }

        #messages-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .mesh-msg {
            padding: 8px;
            border-bottom: 1px solid #404040;
            font-size: 0.85rem;
        }

        .mesh-msg .from { color: #ff6b35; font-weight: bold; }
        .mesh-msg .time { color: #666; font-size: 0.7rem; }

        .panel button {
            width: 100%;
            margin-top: 10px;
            background: #404040;
        }

        @media (max-width: 768px) {
            .main { flex-direction: column; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>
    <header>
        <h1>SURVIVAL AI</h1>
        <div class="status" id="system-status">Checking...</div>
    </header>

    <div class="main">
        <div class="chat-section">
            <div id="chat"></div>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Ask about survival...">
                <button id="mic-btn">🎤</button>
                <button id="send-btn">Send</button>
            </div>
        </div>

        <div class="sidebar">
            <div class="panel">
                <h2>📡 Mesh Messages</h2>
                <div id="messages-list"></div>
                <button id="check-messages">Check Messages</button>
                <button id="send-msg-btn">Send Message</button>
            </div>

            <div class="panel">
                <h2>🗺️ Quick Actions</h2>
                <button onclick="showMapInfo()">Map Info</button>
                <button onclick="showGuides()">Study Guides</button>
            </div>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const micBtn = document.getElementById('mic-btn');

        // Check system status
        fetch('/api/status')
            .then(r => r.json())
            .then(d => {
                const s = d.status;
                document.getElementById('system-status').innerHTML =
                    `Ollama: <span class="${s.ollama === 'connected' ? 'ok' : 'error'}">${s.ollama}</span> | ` +
                    `Model: <span class="${s.model === 'loaded' ? 'ok' : 'error'}">${s.model}</span> | ` +
                    `STT: <span class="${s.speech ? 'ok' : 'error'}">${s.speech ? 'ok' : 'no'}</span> | ` +
                    `Mesh: <span class="${s.messaging ? 'ok' : 'error'}">${s.messaging ? 'ok' : 'no'}</span>`;
            });

        // Send message
        function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            addMessage('user', text);
            input.value = '';

            fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: text})
            })
            .then(r => r.json())
            .then(d => {
                if (d.response) {
                    addMessage('ai', d.response, d.sources);
                }
                if (d.error) {
                    addMessage('ai', 'Error: ' + d.error);
                }
            });
        }

        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });

        // Mic
        micBtn.addEventListener('click', () => {
            micBtn.classList.add('listening');
            fetch('/api/speech/listen', {method: 'POST'})
                .then(r => r.json())
                .then(d => {
                    micBtn.classList.remove('listening');
                    if (d.text) {
                        input.value = d.text;
                    } else {
                        alert(d.error || 'No speech detected');
                    }
                });
        });

        function addMessage(role, text, sources = []) {
            const div = document.createElement('div');
            div.className = `message ${role}`;

            let html = role === 'user' ? text : text.replace(/\n/g, '<br>');

            if (sources && sources.length > 0) {
                html += '<div class="sources">Sources: ' +
                    sources.map(s => s.source).join(', ') + '</div>';
            }

            div.innerHTML = html;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        // Check mesh messages
        document.getElementById('check-messages').addEventListener('click', () => {
            fetch('/api/messages')
                .then(r => r.json())
                .then(d => {
                    const list = document.getElementById('messages-list');
                    list.innerHTML = d.messages.slice(0, 10).map(m =>
                        `<div class="mesh-msg">
                            <span class="from">${m.from}</span>:
                            ${m.message}
                            <div class="time">${new Date(m.timestamp).toLocaleString()}</div>
                        </div>`
                    ).join('') || '<div class="mesh-msg">No messages</div>';
                });
        });

        document.getElementById('send-msg-btn').addEventListener('click', () => {
            const msg = prompt('Enter message:');
            if (msg) {
                fetch('/api/messages/send', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: msg})
                })
                .then(r => r.json())
                .then(d => alert(d.success ? 'Sent!' : 'Failed'));
            }
        });

        function showMapInfo() { alert('Map feature coming soon - requires offline map tiles'); }
        function showGuides() { alert('Study guides: Add .md files to data/knowledge_base/'); }
    </script>
</body>
</html>
